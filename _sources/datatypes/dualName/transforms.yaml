transforms:
  - id: Dual-name-label
    description: Python snippet (no dependencies) that creates a multilingual label using indigenous label first if present
    type: python
    inputs:
      mediaTypes:
        - application/json
    outputs:
      mediaTypes:
        - text/plain
      defaultExtension: txt
    code: |
      import json
      data = json.loads(input_data)
      en_label=""
      in_label=""
      slash=""
      for p in data['hasPart']:
          if p['type'] == 'wa:indigenousName':
              in_label = p['label']
          elif  p['type'] == 'wa:placeName':
              en_label = p['label']
      if in_label and en_label:
          slash = " / "
      output_data=f"{in_label}{slash}{en_label}"


